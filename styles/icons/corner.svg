<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
    <!-- Top-left corner flourish: short curl with a terminal dot. Designed
         to sit at the top-left of a panel; rotate via CSS for other corners. -->
    <path d="M 1 14 Q 1 1 14 1"
          stroke="#f0c674"
          stroke-width="0.6"
          fill="none"
          stroke-linecap="round"/>
    <circle cx="14" cy="1" r="0.9" fill="#f0c674"/>
    <circle cx="1"  cy="14" r="0.9" fill="#f0c674"/>
</svg>
